            <!-- Hi! My name is Jorge. I'm the CTO and co-founder of [Canopy Labs](https://canopylabs.com), a Y Combinator-backed company. At Canopy, we've built a platform that helps B2C marketing teams create and manage personalized experiences for their customers across different channels.

Before Canopy, I received a PhD from the [University of Waterloo](https://uwaterloo.ca/), while being a PhD Student in Residence at the [Perimeter Institute for Theoretical Physics](http://pitp.ca/).

I love all things data and machine learning. In particular, I have experience and a keen interest in productionizing machine learning systems to create an amazing user experience, and building data systems to inform decision making. My favorite part of what I do is leading and working with the teams that build such systems.

I live in Toronto with my wife and two kids. Outside of work, I enjoy music, books, and Brazilian jiu-jitsu.

I'm always keen to help and advice entrepreneurs and companies. If you think I can be helpful, please don't hesitate to reach out at [jorge@jorgeescobedo.com](mailto:jorge@jorgeescobedo.com). -->
